spring.application.name=identity-service

# C?u hšnh k?t n?i PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/identity_db
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# C?u hšnh JPA / Hibernate t? ??ng c?p nh?t c?u trºc b?ng
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# C?u hšnh JWT
jwt.secret=ThisIsAVerySecretKeyForIdentityServiceThatNeedsToBeAtLeast256BitsLong
jwt.expiration=3600000